<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>電車ドラレコ映像</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  text-align:center;
  padding:28px 14px;
}
.wrap{
  max-width:430px;
  margin:auto;
}
.badge{
  display:inline-block;
  background:#b00000;
  padding:7px 13px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:14px;
}
h1{
  font-size:26px;
  line-height:1.35;
  margin:8px 0 12px;
}
p{
  color:#ccc;
  line-height:1.7;
  font-size:14px;
}
.imgbox{
  position:relative;
  margin:20px 0;
}
img{
  width:100%;
  border-radius:14px;
  filter:blur(2.5px) brightness(0.72);
  border:1px solid #333;
}
.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:54px;
  text-shadow:0 3px 18px black;
}
.btn{
  display:block;
  background:#e60012;
  color:white;
  text-decoration:none;
  padding:18px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  margin-top:18px;
  box-shadow:0 8px 24px rgba(230,0,18,.35);
}
.small{
  font-size:11px;
  color:#777;
  margin-top:16px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">⚠️ 閲覧注意</div>
  <h1>電車ドラレコ風の映像<br>続きはこちら</h1>
  <p>話題になっている映像の続き・関連リンクをまとめています。<br>見る場合は自己責任で。</p>

  <div class="imgbox">
    <img src="thumb.jpeg" alt="電車ドラレコ風サムネイル">
    <div class="overlay">▶</div>
  </div>

  <a class="btn" href="https://lite.tiktok.com/t/ZS9FTSKcdFtgA-3bNe3/" target="_blank" rel="noopener">映像を見る</a>

  <div class="small">※実際の事故映像と断定するものではありません。</div>
</div>
</body>
</html>
